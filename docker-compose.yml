version: "3.8"

services:

  postgres:
    image: postgres:16
    container_name: autodb_postgres
    restart: always
    environment:
      POSTGRES_USER: autodb_user
      POSTGRES_PASSWORD: autodb_pass
      POSTGRES_DB: autodb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodb_user -d autodb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: autodb_redis
    restart: always
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: autodb_server
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5000
      FRONTEND_URL: http://localhost:5173
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: autodb_user
      PG_PASSWORD: autodb_pass
      PG_DATABASE: autodb
      JWT_SECRET: ${JWT_SECRET:-changeme_dev}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-changeme_access_dev}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-changeme_refresh_dev}
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5000:5000"
    volumes:
      - ./server/src:/app/src
      - /app/node_modules
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: autodb_client
    restart: on-failure
    depends_on:
      - server
    environment:
      VITE_API_BASE_URL: http://localhost:5000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./client/src:/app/src
      - /app/node_modules

volumes:
  postgres-data:
